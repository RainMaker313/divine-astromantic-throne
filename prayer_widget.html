<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مواقيت الصلاة</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: linear-gradient(135deg, #0a0000 0%, #1a0000 50%, #0a0000 100%);
    color: #ff0000;
    font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255, 0, 0, 0.015) 2px,
      rgba(255, 0, 0, 0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Animated scanline sweep */
  body::after {
    content: '';
    position: fixed;
    top: -10%;
    left: 0;
    width: 100%;
    height: 10%;
    background: linear-gradient(
      180deg,
      transparent 0%,
      rgba(255, 0, 0, 0.08) 50%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 101;
    animation: scanline 15s linear infinite;
  }

  @keyframes scanline {
    0% { top: -10%; }
    100% { top: 110%; }
  }

  .widget {
    position: relative;
    width: 420px;
    padding: 25px 25px 20px;
    background: linear-gradient(145deg, #0d0000 0%, #150000 100%);
    border: 1px solid #330000;
    box-shadow:
      0 0 20px rgba(255, 0, 0, 0.15),
      0 0 60px rgba(255, 0, 0, 0.05),
      inset 0 0 30px rgba(255, 0, 0, 0.03);
    z-index: 1;
  }

  /* Corner accents */
  .widget::before,
  .widget::after {
    content: '';
    position: absolute;
    width: 30px;
    height: 30px;
    border-color: #ff0000;
    border-style: solid;
    z-index: 2;
  }

  .widget::before {
    top: -1px;
    right: -1px;
    border-width: 2px 2px 0 0;
  }

  .widget::after {
    bottom: -1px;
    left: -1px;
    border-width: 0 0 2px 2px;
  }

  .corner-tl, .corner-br {
    position: absolute;
    width: 30px;
    height: 30px;
    border-color: #ff0000;
    border-style: solid;
    z-index: 2;
  }

  .corner-tl {
    top: -1px;
    left: -1px;
    border-width: 2px 0 0 2px;
  }

  .corner-br {
    bottom: -1px;
    right: -1px;
    border-width: 0 2px 2px 0;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 18px;
    position: relative;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    text-shadow:
      0 0 7px rgba(255, 0, 0, 0.8),
      0 0 20px rgba(255, 0, 0, 0.4),
      0 0 40px rgba(255, 0, 0, 0.2);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .hijri-date {
    font-size: 14px;
    color: #cc0000;
    text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    direction: rtl;
  }

  .gregorian-date {
    font-size: 11px;
    color: #880000;
    margin-top: 3px;
    text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #550000, #ff0000, #550000, transparent);
    margin: 12px 0;
    box-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
  }

  /* Prayer table */
  .prayer-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 4px;
  }

  .prayer-row {
    transition: all 0.3s ease;
  }

  .prayer-row.next-prayer {
    animation: pulse-row 2s ease-in-out infinite;
  }

  @keyframes pulse-row {
    0%, 100% {
      background: rgba(255, 0, 0, 0.05);
    }
    50% {
      background: rgba(255, 0, 0, 0.12);
    }
  }

  .prayer-row.next-prayer .prayer-name {
    text-shadow:
      0 0 8px rgba(255, 0, 0, 1),
      0 0 20px rgba(255, 0, 0, 0.6),
      0 0 40px rgba(255, 0, 0, 0.3);
  }

  .prayer-row.next-prayer .prayer-time {
    text-shadow:
      0 0 8px rgba(255, 0, 0, 1),
      0 0 20px rgba(255, 0, 0, 0.6),
      0 0 40px rgba(255, 0, 0, 0.3);
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.7;
    }
  }

  .prayer-name {
    font-size: 17px;
    font-weight: 700;
    padding: 6px 12px;
    text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    text-align: right;
    width: 50%;
  }

  .prayer-time {
    font-size: 17px;
    font-weight: 700;
    padding: 6px 12px;
    text-align: left;
    width: 50%;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
  }

  .prayer-row.normal .prayer-name,
  .prayer-row.normal .prayer-time {
    color: #cc0000;
  }

  /* Countdown section */
  .countdown-section {
    text-align: center;
    margin-top: 18px;
    padding: 14px 10px 10px;
    border-top: 1px solid #330000;
    position: relative;
  }

  .countdown-label {
    font-size: 13px;
    color: #990000;
    margin-bottom: 8px;
    text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
  }

  .countdown-prayer-name {
    font-size: 16px;
    font-weight: 700;
    color: #ff0000;
    margin-bottom: 8px;
    text-shadow:
      0 0 8px rgba(255, 0, 0, 0.8),
      0 0 20px rgba(255, 0, 0, 0.4);
  }

  .countdown-timer {
    font-size: 32px;
    font-weight: 700;
    color: #ff0000;
    letter-spacing: 4px;
    text-shadow:
      0 0 10px rgba(255, 0, 0, 1),
      0 0 30px rgba(255, 0, 0, 0.5),
      0 0 60px rgba(255, 0, 0, 0.2);
    font-variant-numeric: tabular-nums;
    font-family: 'Segoe UI', 'Tahoma', monospace;
  }

  /* HUD decorative elements */
  .hud-line {
    position: absolute;
    background: rgba(255, 0, 0, 0.15);
  }

  .hud-left, .hud-right {
    width: 1px;
    height: 60px;
    top: 50%;
    transform: translateY(-50%);
  }

  .hud-left { left: 8px; }
  .hud-right { right: 8px; }

  .hud-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ff0000;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255, 0, 0, 0.8);
  }

  .hud-dot-tl { top: 5px; left: 5px; }
  .hud-dot-tr { top: 5px; right: 5px; }
  .hud-dot-bl { bottom: 5px; left: 5px; }
  .hud-dot-br { bottom: 5px; right: 5px; }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 8px;
    border-top: 1px solid #220000;
    font-size: 10px;
    color: #550000;
  }

  .status-bar span {
    text-shadow: 0 0 3px rgba(255, 0, 0, 0.2);
  }
</style>
</head>
<body>

<div class="widget" id="widget">
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="hud-dot hud-dot-tl"></div>
  <div class="hud-dot hud-dot-tr"></div>
  <div class="hud-dot hud-dot-bl"></div>
  <div class="hud-dot hud-dot-br"></div>

  <div class="header">
    <h1>مواقيت الصلاة</h1>
    <div class="hijri-date" id="hijriDate"></div>
    <div class="gregorian-date" id="gregorianDate"></div>
  </div>

  <div class="divider"></div>

  <table class="prayer-table" id="prayerTable">
    <tbody id="prayerBody"></tbody>
  </table>

  <div class="countdown-section">
    <div class="countdown-label">المتبقي حتى الصلاة القادمة</div>
    <div class="countdown-prayer-name" id="nextPrayerName"></div>
    <div class="countdown-timer" id="countdownTimer">٠٠:٠٠:٠٠</div>
  </div>

  <div class="status-bar">
    <span>أم القرى</span>
    <span>جنوب أفريقيا - يتينهاج</span>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== ARABIC-INDIC NUMERICS =====
  var arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  function toArabicIndic(n) {
    return String(n).replace(/[0-9]/g, function(d) { return arabicDigits[parseInt(d)]; });
  }

  // ===== PAD ZERO (compatibility) =====
  function pad2(n) {
    return n < 10 ? '0' + n : '' + n;
  }

  // ===== HIJRI MONTH NAMES (Arabic) =====
  var hijriMonthNames = [
    'محرم', 'صفر', 'ربيع الأول', 'ربيع الثاني',
    'جمادى الأولى', 'جمادى الثانية', 'رجب', 'شعبان',
    'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'
  ];

  // ===== TRIG FUNCTIONS (degrees) =====
  function dcos(deg) { return Math.cos(deg * Math.PI / 180); }
  function dsin(deg) { return Math.sin(deg * Math.PI / 180); }

  // ===== GREGORIAN TO JULIAN DAY =====
  function gregorianToJulian(dat) {
    var day = dat.day;
    var month = dat.month;
    var year = dat.year;

    if (dat.hour !== undefined) {
      day += (dat.hour + (dat.minute + (dat.second / 60)) / 60.0) / 24.0;
    }

    if (month <= 2) {
      month += 12;
      year -= 1;
    }

    var a = Math.floor(year / 100);
    var b = (year > 1582 || (year === 1582 && (month > 10 || (month === 10 && day > 15))))
      ? 2 - a + Math.floor(a / 4) : 0;

    return Math.floor(365.25 * (year + 4716)) +
      Math.floor(30.60 * (month + 1)) + day + b - 1524.5;
  }

  // ===== EQUATION OF TIME =====
  function equationOfTime(jd) {
    var n = jd - 2451544.5;
    var g = 357.528 + 0.9856003 * n;
    var c = 1.9148 * dsin(g) + 0.02 * dsin(2 * g) + 0.0003 * dsin(3 * g);
    var lamda = 280.47 + 0.9856003 * n + c;
    var r = -2.468 * dsin(2 * lamda) + 0.053 * dsin(4 * lamda) + 0.0014 * dsin(6 * lamda);
    return (c + r) * 4;
  }

  // ===== SUN DECLINATION =====
  function sunDeclination(jd) {
    var n = jd - 2451544.5;
    var epsilon = 23.44 - 0.0000004 * n;
    var l = 280.466 + 0.9856474 * n;
    var g = 357.528 + 0.9856003 * n;
    var lamda = l + 1.915 * dsin(g) + 0.02 * dsin(2 * g);
    var x = dsin(epsilon) * dsin(lamda);
    return (180 / (4 * Math.atan(1))) * Math.atan(x / Math.sqrt(-x * x + 1));
  }

  // ===== TIME FOR ANGLE =====
  function timeForAngle(angle, latitude, declination) {
    var s = (dcos(angle) - dsin(latitude) * dsin(declination)) /
            (dcos(latitude) * dcos(declination));
    return (180 / Math.PI * (Math.atan(-s / Math.sqrt(-s * s + 1)) + Math.PI / 2)) / 15;
  }

  // ===== ASR ANGLE (Shafii madhab=1) =====
  function getAsrAngle(latitude, declination, asrMadhab) {
    var x = dsin(latitude) * dsin(declination) +
            dcos(latitude) * dcos(declination);
    var a = Math.atan(x / Math.sqrt(-x * x + 1));
    var xx = asrMadhab + (1 / Math.tan(a));
    return 90 - (180 / Math.PI) * (Math.atan(xx) + 2 * Math.atan(1));
  }

  // ===== JULIAN TO HIJRI =====
  function julianToHijri(julianDay) {
    var l = Math.floor(julianDay) - 1948440 + 10632;
    var n = Math.floor((l - 1) / 10631);
    l = l - 10631 * n + 354;
    var j = (Math.floor((10985 - l) / 5316) * Math.floor((50 * l) / 17719) +
             Math.floor(l / 5670) * Math.floor((43 * l) / 15238));
    l = l - Math.floor((30 - j) / 15) * Math.floor((17719 * j) / 50) -
        Math.floor(j / 16) * Math.floor((15238 * j) / 43) + 29;
    var month = Math.floor((24 * l) / 709);
    var day = l - Math.floor((709 * month) / 24);
    var year = Math.floor(30 * n + j - 30);
    return { year: year, month: month, day: day };
  }

  // ===== HOURS TO TIME STRING =====
  function hoursToTimeString(hours) {
    // Normalize to 0-24
    hours = ((hours % 24) + 24) % 24;
    var h = Math.floor(hours);
    var m = Math.floor((hours - h) * 60);
    var s = Math.floor(((hours - h) * 60 - m) * 60);
    return {
      hours: h,
      minutes: m,
      seconds: s,
      toString: function() {
        return toArabicIndic(pad2(h)) + ':' +
               toArabicIndic(pad2(m)) + ':' +
               toArabicIndic(pad2(s));
      },
      toHHMM: function() {
        return toArabicIndic(pad2(h)) + ':' +
               toArabicIndic(pad2(m));
      },
      totalSeconds: function() {
        return h * 3600 + m * 60 + s;
      }
    };
  }

  // ===== PRAYER CONFIG =====
  var config = {
    latitude: -33.76,
    longitude: 25.40,
    timezone: 2,
    fajrAngle: 18.5 + 90.0,  // Umm al-Qura
    maghrebAngle: 90.83333,
    sherookAngle: 90.83333,
    asrMadhab: 1,  // Shafii (Jomhor)
    ishaaFixedMinutes: 90  // 90 min after maghreb
  };

  var middleLongitude = config.timezone * 15;
  var longitudeDifference = (middleLongitude - config.longitude) / 15;

  // ===== CALCULATE PRAYER TIMES =====
  function calculatePrayerTimes(date) {
    var dat = {
      year: date.getFullYear(),
      month: date.getMonth() + 1,
      day: date.getDate(),
      hour: date.getHours(),
      minute: date.getMinutes(),
      second: date.getSeconds()
    };

    var jd = gregorianToJulian(dat);
    var delta = sunDeclination(jd);
    var timeEq = equationOfTime(jd);

    // Dhuhr
    var dhuhrHours = 12 + longitudeDifference + timeEq / 60;

    // Other prayers
    var fajrHours = dhuhrHours - timeForAngle(config.fajrAngle, config.latitude, delta);
    var sherookHours = dhuhrHours - timeForAngle(config.sherookAngle, config.latitude, delta);
    var asrAngle = getAsrAngle(config.latitude, delta, config.asrMadhab);
    var asrHours = dhuhrHours + timeForAngle(asrAngle, config.latitude, delta);
    var maghrebHours = dhuhrHours + timeForAngle(config.maghrebAngle, config.latitude, delta);

    // Isha: FixedTime - 90 minutes after maghreb
    var ishaaHours = maghrebHours + config.ishaaFixedMinutes / 60.0;

    return {
      fajr: hoursToTimeString(fajrHours),
      sherook: hoursToTimeString(sherookHours),
      dhuhr: hoursToTimeString(dhuhrHours),
      asr: hoursToTimeString(asrHours),
      maghreb: hoursToTimeString(maghrebHours),
      ishaa: hoursToTimeString(ishaaHours),
      dhuhrRaw: dhuhrHours,
      fajrRaw: fajrHours,
      maghrebRaw: maghrebHours
    };
  }

  // ===== GET HIJRI DATE =====
  function getHijriDate(date) {
    var dat = {
      year: date.getFullYear(),
      month: date.getMonth() + 1,
      day: date.getDate()
    };
    var jd = gregorianToJulian(dat);
    return julianToHijri(jd);
  }

  // ===== PRAYER DATA =====
  var prayers = [
    { key: 'fajr', name: 'الفجر' },
    { key: 'sherook', name: 'الشروق' },
    { key: 'dhuhr', name: 'الظهر' },
    { key: 'asr', name: 'العصر' },
    { key: 'maghreb', name: 'المغرب' },
    { key: 'ishaa', name: 'العشاء' }
  ];

  // ===== FIND NEXT PRAYER =====
  function findNextPrayer(prayerTimes, now) {
    var currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

    for (var i = 0; i < prayers.length; i++) {
      var pt = prayerTimes[prayers[i].key];
      if (pt.totalSeconds() > currentSeconds) {
        return { prayer: prayers[i], time: pt, index: i };
      }
    }
    // All prayers passed, next is tomorrow's fajr
    return { prayer: prayers[0], time: prayerTimes[prayers[0].key], index: 0, tomorrow: true };
  }

  // ===== UPDATE DISPLAY =====
  function update() {
    var now = new Date();
    var prayerTimes = calculatePrayerTimes(now);
    var hijri = getHijriDate(now);

    // Update Hijri date
    var hijriStr = toArabicIndic(String(hijri.day)) + ' ' +
                   hijriMonthNames[hijri.month - 1] + ' ' +
                   toArabicIndic(String(hijri.year)) + ' هـ';
    document.getElementById('hijriDate').textContent = hijriStr;

    // Update Gregorian date (in Arabic)
    var monthsGre = ['يناير','فبراير','مارس','أبريل','مايو','يونيو',
                     'يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    var greStr = toArabicIndic(String(now.getDate())) + ' ' +
                 monthsGre[now.getMonth()] + ' ' +
                 toArabicIndic(String(now.getFullYear())) + ' م';
    document.getElementById('gregorianDate').textContent = greStr;

    // Find next prayer
    var next = findNextPrayer(prayerTimes, now);

    // Build prayer table
    var tbody = document.getElementById('prayerBody');
    tbody.innerHTML = '';

    for (var i = 0; i < prayers.length; i++) {
      var p = prayers[i];
      var pt = prayerTimes[p.key];
      var isNext = (next.index === i && !next.tomorrow) ||
                   (next.tomorrow && i === 0);

      var row = document.createElement('tr');
      row.className = 'prayer-row ' + (isNext ? 'next-prayer' : 'normal');

      var nameTd = document.createElement('td');
      nameTd.className = 'prayer-name';
      nameTd.textContent = p.name;

      var timeTd = document.createElement('td');
      timeTd.className = 'prayer-time';
      timeTd.textContent = pt.toHHMM();

      row.appendChild(nameTd);
      row.appendChild(timeTd);
      tbody.appendChild(row);
    }

    // Update countdown
    document.getElementById('nextPrayerName').textContent = next.prayer.name;

    var diff;
    if (next.tomorrow) {
      // Seconds remaining until midnight + seconds from midnight to tomorrow's prayer
      var secondsInDay = 24 * 3600;
      var currentSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
      diff = (secondsInDay - currentSeconds) + next.time.totalSeconds();
    } else {
      diff = next.time.totalSeconds() - (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds());
    }

    if (diff < 0) diff = 0;

    var diffH = Math.floor(diff / 3600);
    var diffM = Math.floor((diff % 3600) / 60);
    var diffS = diff % 60;

    var timerStr = toArabicIndic(pad2(diffH)) + ':' +
                   toArabicIndic(pad2(diffM)) + ':' +
                   toArabicIndic(pad2(diffS));

    document.getElementById('countdownTimer').textContent = timerStr;
  }

  // Initial update and interval
  update();
  setInterval(update, 1000);
})();
</script>
</body>
</html>
